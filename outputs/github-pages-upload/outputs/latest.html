<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>데일리 인사 시사점 리포트</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f5f8;
        color: #111827;
        font-family: "Malgun Gothic", "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(680px, calc(100% - 40px));
        padding: 28px;
        background: #fff;
        border: 1px solid #dfe5ee;
        border-radius: 8px;
        box-shadow: 0 14px 30px rgba(28, 42, 58, 0.06);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #687789;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>아직 발행된 데일리 리포트가 없습니다</h1>
      <p>자동화가 첫 리포트를 생성하면 이 파일은 최신 리포트 내용으로 교체됩니다.</p>
    </main>
  </body>
</html>
