<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>People Impact Explorer - 리포트 이력</title>
    <style>
      :root {
        --bg: #f3f5f8;
        --paper: #ffffff;
        --ink: #111827;
        --ink-2: #273344;
        --muted: #687789;
        --line: #dfe5ee;
        --blue: #2f55d4;
        --teal: #0f8f87;
        --shadow: 0 14px 30px rgba(28, 42, 58, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Malgun Gothic", "Segoe UI", Arial, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: end;
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--teal);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      .subcopy {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink-2);
        font-weight: 800;
      }

      .button.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #fff;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .calendar {
        padding: 18px;
      }

      .calendar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .calendar-head strong {
        font-size: 18px;
      }

      .month-nav {
        display: flex;
        gap: 8px;
      }

      button {
        min-width: 38px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink-2);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .weekdays,
      .days {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .weekdays span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }

      .day {
        min-height: 92px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
        color: var(--muted);
      }

      .day.has-report {
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      .day.has-report:hover,
      .day.selected {
        border-color: var(--blue);
        box-shadow: inset 0 0 0 1px var(--blue);
      }

      .day-num {
        display: block;
        margin-bottom: 8px;
        font-weight: 900;
      }

      .day-badge {
        display: inline-flex;
        max-width: 100%;
        padding: 4px 7px;
        border-radius: 999px;
        background: #e9f2ff;
        color: var(--blue);
        font-size: 11px;
        font-weight: 900;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .side {
        padding: 18px;
      }

      .side h2 {
        margin: 0 0 8px;
        font-size: 19px;
      }

      .side p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.55;
      }

      .issue-list {
        display: grid;
        gap: 8px;
        margin: 14px 0;
        padding: 0;
        list-style: none;
      }

      .issue-list li {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
        color: var(--ink-2);
        font-size: 13px;
        line-height: 1.45;
      }

      .empty {
        padding: 18px;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .shell {
          padding: 20px;
        }

        .topbar,
        .layout {
          grid-template-columns: 1fr;
        }

        .button-row {
          justify-content: flex-start;
        }

        .day {
          min-height: 70px;
          padding: 8px;
        }

        .day-badge {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">People Impact Explorer</p>
          <h1>데일리 리포트 이력</h1>
          <p class="subcopy">날짜를 선택하면 해당일 리포트와 선정 이슈를 확인할 수 있습니다.</p>
        </div>
        <nav class="button-row" aria-label="빠른 이동">
          <a class="button" href="index.html">홈</a>
          <a class="button primary" href="outputs/latest.html">최신 리포트</a>
        </nav>
      </header>

      <section class="layout">
        <article class="panel calendar">
          <div class="calendar-head">
            <strong id="monthLabel">-</strong>
            <div class="month-nav">
              <button type="button" id="prevMonth" aria-label="이전 달">‹</button>
              <button type="button" id="nextMonth" aria-label="다음 달">›</button>
            </div>
          </div>
          <div class="weekdays" aria-hidden="true">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="days" id="days"></div>
        </article>

        <aside class="panel side" id="detail">
          <h2>리포트를 선택하세요</h2>
          <p>달력에서 표시된 날짜를 누르면 상세 이력과 링크가 표시됩니다.</p>
        </aside>
      </section>
    </main>

    <script>
      const state = {
        reports: [],
        current: new Date(),
        selected: "",
      };

      const fallbackReports = [
        {
          date: "2026-06-24",
          title: "2026-06-24 데일리 인사 시사점 리포트",
          file: "outputs/데일리_인사시사점리포트_20260624.html",
          latest: true,
          issues: [
            "삼성전자 DS부문 반도체·AI 경력 채용 공고 점검",
            "한국은행 물가 점검 속 IT 업종 특별급여·성과급 영향 부각",
            "Google AI 인재 경쟁과 핵심 인력 유지 리스크",
          ],
        },
      ];

      const nodes = {
        monthLabel: document.getElementById("monthLabel"),
        days: document.getElementById("days"),
        detail: document.getElementById("detail"),
        prevMonth: document.getElementById("prevMonth"),
        nextMonth: document.getElementById("nextMonth"),
      };

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function ymd(date) {
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function findReport(dateKey) {
        return state.reports.find((item) => item.date === dateKey);
      }

      function renderDetail(report) {
        if (!report) {
          nodes.detail.innerHTML = `
            <h2>리포트를 선택하세요</h2>
            <p>달력에서 표시된 날짜를 누르면 상세 이력과 링크가 표시됩니다.</p>
          `;
          return;
        }

        nodes.detail.innerHTML = `
          <h2>${escapeHtml(report.date)}</h2>
          <p>${escapeHtml(report.title || "데일리 인사 시사점 리포트")}</p>
          <ul class="issue-list">
            ${(report.issues || []).map((issue) => `<li>${escapeHtml(issue)}</li>`).join("")}
          </ul>
          <a class="button primary" href="${escapeHtml(report.file)}">이 날짜 리포트 열기</a>
        `;
      }

      function renderCalendar() {
        const year = state.current.getFullYear();
        const month = state.current.getMonth();
        const first = new Date(year, month, 1);
        const last = new Date(year, month + 1, 0);
        nodes.monthLabel.textContent = `${year}년 ${month + 1}월`;

        const cells = [];
        for (let i = 0; i < first.getDay(); i += 1) {
          cells.push('<div class="day" aria-hidden="true"></div>');
        }

        for (let day = 1; day <= last.getDate(); day += 1) {
          const date = new Date(year, month, day);
          const key = ymd(date);
          const report = findReport(key);
          const selected = state.selected === key ? " selected" : "";
          cells.push(`
            <button class="day ${report ? "has-report" : ""}${selected}" type="button" data-date="${key}" ${report ? "" : "disabled"}>
              <span class="day-num">${day}</span>
              ${report ? `<span class="day-badge">리포트</span>` : ""}
            </button>
          `);
        }

        nodes.days.innerHTML = cells.join("");
        nodes.days.querySelectorAll(".has-report").forEach((button) => {
          button.addEventListener("click", () => {
            state.selected = button.dataset.date;
            renderCalendar();
            renderDetail(findReport(state.selected));
          });
        });
      }

      async function init() {
        try {
          const response = await fetch("outputs/reports.json", { cache: "no-store" });
          if (!response.ok) throw new Error("reports.json unavailable");
          state.reports = await response.json();
        } catch (error) {
          state.reports = fallbackReports;
        }

        state.reports.sort((a, b) => b.date.localeCompare(a.date));
        const latest = state.reports[0];
        if (latest) {
          state.selected = latest.date;
          state.current = new Date(`${latest.date}T00:00:00`);
        }
        renderCalendar();
        renderDetail(latest);
      }

      nodes.prevMonth.addEventListener("click", () => {
        state.current = new Date(state.current.getFullYear(), state.current.getMonth() - 1, 1);
        renderCalendar();
      });

      nodes.nextMonth.addEventListener("click", () => {
        state.current = new Date(state.current.getFullYear(), state.current.getMonth() + 1, 1);
        renderCalendar();
      });

      init();
    </script>
  </body>
</html>
